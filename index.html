<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天文知识库与题库系统</title>
    <style>
         :root {
            --bg-start: #070b1f;
            --bg-mid: #0d1536;
            --bg-end: #111e49;
            --text-primary: #e6f3ff;
            --text-secondary: #a9c8eb;
            --accent: #64b5f6;
            --accent-soft: rgba(100, 181, 246, 0.16);
            --panel-border: rgba(134, 197, 255, 0.55);
            --panel-bg: rgba(10, 22, 56, 0.58);
            --shadow-soft: 0 14px 30px rgba(6, 12, 35, 0.45);
            --radius-md: 12px;
            --radius-sm: 8px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(circle at 15% 0%, #1f3f80 0%, transparent 45%),
                        radial-gradient(circle at 85% 0%, #2f5da9 0%, transparent 35%),
                        linear-gradient(180deg, var(--bg-start) 0%, var(--bg-mid) 45%, var(--bg-end) 100%);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: background-color 0.5s;
            line-height: 1.7;
            letter-spacing: 0.2px;
        }
        
        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            border-radius: 18px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(8px);
        }
        
        h1, h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #8bccff;
            text-shadow: 0 4px 18px rgba(73, 165, 255, 0.35);
            letter-spacing: 0.8px;
        }

        .page-subtitle {
            text-align: center;
            margin: -16px auto 26px;
            color: var(--text-secondary);
            max-width: 760px;
            font-size: 15px;
        }
        
        h3 {
            color: #64b5f6;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .menu-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: 2px solid #64b5f6;
            color: white;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 8px 18px rgba(4, 10, 28, 0.35);
        }
        
        button:hover {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.6);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .menu {
            display: none;
        }
        
        .menu.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 15px;
            background-color: rgba(30, 60, 114, 0.5);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            background-color: rgba(30, 60, 114, 0.8);
            box-shadow: 0 0 10px rgba(100, 181, 246, 0.4);
        }
        
        .search-input::placeholder {
            color: #90caf9;
        }
        
        .search-results {
            background-color: rgba(30, 60, 114, 0.3);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .search-results.active {
            display: block;
        }
        
        .search-result-item {
            padding: 10px;
            margin-bottom: 8px;
            background-color: rgba(100, 181, 246, 0.1);
            border-left: 3px solid #64b5f6;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .search-result-item:hover {
            background-color: rgba(100, 181, 246, 0.2);
            transform: translateX(5px);
        }
        
        .search-result-item strong {
            color: #64b5f6;
        }
        
        .search-result-category {
            font-size: 12px;
            color: #90caf9;
            margin-top: 3px;
        }
        
        .no-results {
            text-align: center;
            color: #90caf9;
            padding: 10px;
        }
        
        .category-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .category-btn {
            padding: 12px 15px;
            font-size: 14px;
            background: linear-gradient(135deg, #1a3a52 0%, #1e5a96 100%);
            border: 2px solid #42a5f5;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            border-color: #64b5f6;
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.6);
        }
        
        .content-area {
            background-color: rgba(30, 60, 114, 0.3);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            min-height: 400px;
        }
        
        .content-page {
            display: none;
        }
        
        .content-page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .content-page h4 {
            color: #90caf9;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        
        .content-page p, .content-page ul, .content-page table {
            line-height: 1.8;
            margin-bottom: 15px;
        }
        
        .content-page ul {
            margin-left: 20px;
        }
        
        .content-page li {
            margin-bottom: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        table th, table td {
            border: 1px solid #64b5f6;
            padding: 10px;
            text-align: left;
        }
        
        table th {
            background-color: rgba(100, 181, 246, 0.2);
            color: #64b5f6;
        }
        
        .knowledge-item {
            background-color: rgba(100, 181, 246, 0.1);
            border-left: 4px solid #64b5f6;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        .knowledge-item h5 {
            color: #64b5f6;
            margin-bottom: 8px;
        }
        
        .knowledge-item p {
            margin-bottom: 8px;
        }
        
        .related-questions {
            background-color: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4caf50;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 14px;
            color: #81c784;
        }
        
        .related-questions strong {
            color: #4caf50;
        }
        
        .related-questions a {
            color: #81c784;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .related-questions a:hover {
            color: #4caf50;
            text-decoration: underline;
        }
        
        .import-section {
            background-color: rgba(255, 152, 0, 0.1);
            border: 2px dashed #ff9800;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .import-section h4 {
            color: #ffb74d;
            margin-bottom: 15px;
        }
        
        .import-btn {
            background: linear-gradient(135deg, #f57c00 0%, #ff9800 100%);
            border-color: #ffb74d;
            padding: 12px 30px;
            font-size: 16px;
        }
        
        .import-btn:hover {
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.6);
        }
        
        #questionImportInput {
            display: none;
        }
        
        .return-btn {
            background: linear-gradient(135deg, #c62828 0%, #e53935 100%);
            border-color: #ef5350;
            margin-top: 20px;
        }
        
        .return-btn:hover {
            box-shadow: 0 0 15px rgba(239, 83, 80, 0.6);
        }
        
        .question-list {
            background-color: rgba(30, 60, 114, 0.3);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .question-item {
            background-color: rgba(100, 181, 246, 0.1);
            border-left: 3px solid #64b5f6;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .question-item strong {
            color: #64b5f6;
        }
        
        .question-item p {
            margin-top: 5px;
            font-size: 14px;
            color: #90caf9;
        }
        
        .empty-state {
            text-align: center;
            color: #90caf9;
            padding: 30px;
            font-size: 16px;
        }

        /* ========== 难度选择界面 ========== */
        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .difficulty-card {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2) 0%, rgba(66, 165, 245, 0.1) 100%);
            border: 2px solid #64b5f6;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.5);
            border-color: #90caf9;
        }

        .difficulty-card.easy {
            border-color: #4caf50;
        }

        .difficulty-card.easy:hover {
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .difficulty-card.medium {
            border-color: #ff9800;
        }

        .difficulty-card.medium:hover {
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
        }

        .difficulty-card.hard {
            border-color: #f44336;
        }

        .difficulty-card.hard:hover {
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.5);
        }

        .difficulty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .difficulty-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #64b5f6;
        }

        .difficulty-card.easy .difficulty-name {
            color: #4caf50;
        }

        .difficulty-card.medium .difficulty-name {
            color: #ff9800;
        }

        .difficulty-card.hard .difficulty-name {
            color: #f44336;
        }

        .difficulty-count {
            font-size: 14px;
            color: #90caf9;
            margin-top: 10px;
        }

        /* ========== 分类选择界面 ========== */
        .category-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .category-card {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2) 0%, rgba(66, 165, 245, 0.1) 100%);
            border: 2px solid #64b5f6;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.5);
            border-color: #90caf9;
        }

        .category-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #64b5f6;
        }

        .category-count {
            font-size: 14px;
            color: #90caf9;
            margin-top: 10px;
        }

        /* ========== 答题界面 ========== */
        .quiz-container {
            background-color: rgba(30, 60, 114, 0.3);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 30px;
            margin-top: 20px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #64b5f6;
        }

        .quiz-progress {
            font-size: 16px;
            color: #90caf9;
        }

        .quiz-category {
            font-size: 16px;
            font-weight: bold;
            color: #64b5f6;
        }

        .question-number {
            font-size: 14px;
            color: #90caf9;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            color: #64b5f6;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-container {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: rgba(100, 181, 246, 0.1);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: white;
        }

        .option:hover {
            background-color: rgba(100, 181, 246, 0.2);
            transform: translateX(5px);
        }

        .option.selected {
            background-color: rgba(100, 181, 246, 0.4);
            border-color: #90caf9;
            box-shadow: 0 0 10px rgba(100, 181, 246, 0.5);
        }

        .option.correct {
            background-color: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
            color: #81c784;
        }

        .option.incorrect {
            background-color: rgba(244, 67, 54, 0.3);
            border-color: #f44336;
            color: #ef5350;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .answer-feedback {
            background-color: rgba(30, 60, 114, 0.5);
            border-left: 4px solid #64b5f6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .answer-feedback.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #64b5f6;
        }

        .feedback-title.correct {
            color: #4caf50;
        }

        .feedback-title.incorrect {
            color: #f44336;
        }

        .feedback-content {
            font-size: 14px;
            line-height: 1.8;
            color: #90caf9;
        }

        .feedback-content strong {
            color: #64b5f6;
        }

        .quiz-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quiz-btn {
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #64b5f6;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .quiz-btn:hover {
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.6);
            transform: translateY(-2px);
        }

        .quiz-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quiz-btn.next {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
        }

        .quiz-btn.finish {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            border-color: #81c784;
        }

        .quiz-btn.finish:hover {
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
        }

        /* ========== 答题结果界面 ========== */
        .quiz-result {
            background-color: rgba(30, 60, 114, 0.3);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-top: 20px;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #64b5f6;
        }

        .result-title.excellent {
            color: #4caf50;
        }

        .result-title.good {
            color: #ff9800;
        }

        .result-title.poor {
            color: #f44336;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #64b5f6;
        }

        .result-score.excellent {
            color: #4caf50;
        }

        .result-score.good {
            color: #ff9800;
        }

        .result-score.poor {
            color: #f44336;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background-color: rgba(100, 181, 246, 0.1);
            border: 2px solid #64b5f6;
            border-radius: 8px;
            padding: 20px;
        }

        .stat-label {
            font-size: 14px;
            color: #90caf9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #64b5f6;
        }

        .result-message {
            font-size: 18px;
            color: #90caf9;
            margin: 20px 0;
            line-height: 1.6;
        }

        .result-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .result-btn {
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #64b5f6;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .result-btn:hover {
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.6);
            transform: translateY(-2px);
        }

        .result-btn.again {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border-color: #ffb74d;
        }

        .result-btn.again:hover {
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.6);
        }

        .result-btn.menu {
            background: linear-gradient(135deg, #c62828 0%, #e53935 100%);
            border-color: #ef5350;
        }

        .result-btn.menu:hover {
            box-shadow: 0 0 15px rgba(239, 83, 80, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主菜单 -->
        <div id="mainMenu" class="menu active">
            <h1>🌟 天文知识库与题库系统 🌟</h1>
            <div class="menu-buttons">
                <button onclick="showMenu('libMenu')">📚 知识点库</button>
                <button onclick="showMenu('questionMenu')">❓ 题库</button>
            </div>
        </div>

        <!-- 知识点库菜单 -->
        <div id="libMenu" class="menu">
            <h2>📚 知识点库</h2>
            
            <!-- 搜索框 -->
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="输入关键词搜索知识点（如：恒星、行星、星座、航天器等）"
                    oninput="searchKnowledgePoints()"
                >
            </div>
            
            <!-- 搜索结果 -->
            <div class="search-results" id="searchResults"></div>
            
            <!-- 分类按钮 -->
            <div class="category-buttons" id="categoryButtons"></div>
            
            <!-- 内容区域 -->
            <div class="content-area" id="contentArea"></div>
            
            <button class="return-btn" onclick="showMenu('mainMenu')">← 返回主菜单</button>
        </div>

        <!-- 题库菜单 -->
        <div id="questionMenu" class="menu">
            <h2>❓ 题库</h2>
            
            <!-- 题库导入区域 -->
            <div class="import-section">
                <h4>📥 导入题库</h4>
                <p style="margin-bottom: 15px; color: #ffb74d;">支持 JSON 格式的题库文件导入</p>
                <button class="import-btn" onclick="document.getElementById('questionImportInput').click()">选择文件导入</button>
                <input type="file" id="questionImportInput" accept=".json" onchange="importQuestionBank()">
                <p style="margin-top: 15px; font-size: 12px; color: #90caf9;">
                    提示：JSON 格式应包含 category（分类）、question（题目）、options（选项）、answer（答案）、difficulty（难度）等字段
                </p>
            </div>
            
            <!-- 分类选择界面 -->
            <div id="categorySelector" style="display: none;">
                <h3 style="text-align: center; margin: 30px 0;">选择题目分类</h3>
                <div class="category-selector" id="categorySelectorContainer"></div>
                <button class="return-btn" onclick="showMenu('questionMenu')">← 返回</button>
            </div>

            <!-- 难度选择界面 -->
            <div id="difficultySelector" style="display: none;">
                <h3 style="text-align: center; margin: 30px 0;">选择难度等级开始答题</h3>
                <div class="difficulty-selector">
                    <div class="difficulty-card easy" onclick="startQuiz('easy')">
                        <div class="difficulty-icon">🟢</div>
                        <div class="difficulty-name">低难度</div>
                        <div class="difficulty-count" id="easyCount">0 道题</div>
                    </div>
                    <div class="difficulty-card medium" onclick="startQuiz('medium')">
                        <div class="difficulty-icon">🟡</div>
                        <div class="difficulty-name">中难度</div>

        // ==================== 更新相关题目计数 ====================
        function updateRelatedQuestionsCount(categoryKey) {
            const count = questionBank[categoryKey] ? questionBank[categoryKey].length : 0;
            const elements = document.querySelectorAll(`[id^="question-count-${categoryKey}"]`);
            elements.forEach(el => {
                el.textContent = count > 0 ? `<a onclick="startCategoryQuiz('${categoryKey}')">${count} 道题 → 开始答题</a>` : '暂无题目';
            });
        }

        // ==================== 搜索功能 ====================
        function searchKnowledgePoints() {
            const searchInput = document.getElementById('searchInput').value.trim().toLowerCase();
            const searchResults = document.getElementById('searchResults');
            
            if (!searchInput) {
                searchResults.classList.remove('active');
                return;
            }
            
            const results = [];
            
            Object.entries(knowledgeCategories).forEach(([key, category]) => {
                category.content.forEach(item => {
                    const matchTitle = item.title.toLowerCase().includes(searchInput);
                    const matchKeywords = category.keywords.some(kw => kw.includes(searchInput));
                    
                    if (matchTitle || matchKeywords) {
                        results.push({
                            title: item.title,
                            category: category.name,
                            categoryKey: key,
                            description: item.description
                        });
                    }
                });
            });
            
            if (results.length > 0) {
                let html = '';
                results.forEach(result => {
                    html += `
                        <div class="search-result-item" onclick="showCategory('${result.categoryKey}')">
                            <strong>${result.title}</strong>
                            <div class="search-result-category">${result.category}</div>
                        </div>
                    `;
                });
                searchResults.innerHTML = html;
                searchResults.classList.add('active');
            } else {
                searchResults.innerHTML = '<div class="no-results">未找到相关知识点</div>';
                searchResults.classList.add('active');
            }
        }

        // ==================== 菜单切换 ====================
        function showMenu(menuId) {
            const menus = document.querySelectorAll('.menu');
            menus.forEach(menu => menu.classList.remove('active'));
            document.getElementById(menuId).classList.add('active');
            
            if (menuId === 'libMenu') {
                initializeLibrary();
            } else if (menuId === 'questionMenu') {
                renderQuestionCategories();
            }
        }

        // ==================== 题库导入 ====================
        function importQuestionBank() {
            const fileInput = document.getElementById('questionImportInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // 重置题库
                    questionBank = {
                        stars: [],
                        constellations: [],
                        planets: [],
                        units: [],
                        spacecraft: []
                    };
                    
                    // 导入题目
                    if (Array.isArray(data)) {
                        data.forEach(question => {
                            const category = question.category || 'stars';
                            if (questionBank[category]) {
                                questionBank[category].push(question);
                            }
                        });
                    }
                    
                    alert(`✅ 题库导入成功！共导入 ${data.length} 道题目`);
                    renderQuestionCategories();
                    updateDifficultyCount();
                    
                    // 更新知识点库中的题目计数
                    Object.keys(questionBank).forEach(key => {
                        updateRelatedQuestionsCount(key);
                    });
                    
                } catch (error) {
                    alert('❌ 导入失败：' + error.message);
                }
            };
            reader.readAsText(file);
            
            // 重置文件输入
            fileInput.value = '';
        }

        // ==================== 题库分类显示 ====================
        function renderQuestionCategories() {
            const container = document.getElementById('questionCategoriesContainer');
            const selector = document.getElementById('categorySelector');
            
            // 检查是否有题目
            const totalQuestions = Object.values(questionBank).reduce((sum, arr) => sum + arr.length, 0);
            
            if (totalQuestions === 0) {
                container.innerHTML = '<div class="empty-state">暂无题目，请先导入题库</div>';
                selector.style.display = 'none';
            } else {
                container.innerHTML = '';
                selector.style.display = 'block';
                renderCategorySelector();
            }
        }

        // ==================== 渲染分类选择器 ====================
        function renderCategorySelector() {
            const container = document.getElementById('categorySelectorContainer');
            container.innerHTML = '';
            
            const categoryNames = {
                stars: { name: '⭐ 恒星知识', icon: '⭐' },
                constellations: { name: '🌌 星座与黄道', icon: '🌌' },
                planets: { name: '🪐 行星与天体', icon: '🪐' },
                units: { name: '📏 天文单位与换算', icon: '📏' },
                spacecraft: { name: '🛸 航天器与探测', icon: '🛸' }
            };
            
            Object.entries(questionBank).forEach(([key, questions]) => {
                if (questions.length > 0) {
                    const categoryInfo = categoryNames[key];
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.onclick = () => startCategoryQuiz(key);
                    card.innerHTML = `
                        <div class="category-icon">${categoryInfo.icon}</div>
                        <div class="category-name">${categoryInfo.name}</div>
                        <div class="category-count">${questions.length} 道题</div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // ==================== 开始分类答题 ====================
        function startCategoryQuiz(categoryKey) {
            quizState.currentCategory = categoryKey;
            
            // 按难度分类
            const allQuestions = questionBank[categoryKey];
            const easyCount = allQuestions.filter(q => q.difficulty === 'easy').length;
            const mediumCount = allQuestions.filter(q => q.difficulty === 'medium').length;
            const hardCount = allQuestions.filter(q => q.difficulty === 'hard').length;
            
            document.getElementById('easyCount').textContent = `${easyCount} 道题`;
            document.getElementById('mediumCount').textContent = `${mediumCount} 道题`;
            document.getElementById('hardCount').textContent = `${hardCount} 道题`;
            
            // 显示难度选择
            document.getElementById('categorySelector').style.display = 'none';
            document.getElementById('difficultySelector').style.display = 'block';
        }

        // ==================== 更新难度计数 ====================
        function updateDifficultyCount() {
            const allQuestions = Object.values(questionBank).flat();
            const easyCount = allQuestions.filter(q => q.difficulty === 'easy').length;
            const mediumCount = allQuestions.filter(q => q.difficulty === 'medium').length;
            const hardCount = allQuestions.filter(q => q.difficulty === 'hard').length;
            
            document.getElementById('easyCount').textContent = `${easyCount} 道题`;
            document.getElementById('mediumCount').textContent = `${mediumCount} 道题`;
            document.getElementById('hardCount').textContent = `${hardCount} 道题`;
        }

        // ==================== 开始答题 ====================
        function startQuiz(difficulty) {
            const categoryQuestions = questionBank[quizState.currentCategory];
            const filteredQuestions = categoryQuestions.filter(q => q.difficulty === difficulty);
            
            if (filteredQuestions.length === 0) {
                alert('该难度等级暂无题目');
                return;
            }
            
            // 随机打乱题目
            quizState.questions = filteredQuestions.sort(() => Math.random() - 0.5);
            quizState.currentDifficulty = difficulty;
            quizState.currentQuestionIndex = 0;
            quizState.userAnswers = [];
            quizState.isAnswered = false;
            quizState.correctCount = 0;
            quizState.wrongCount = 0;
            
            // 设置分类显示
            const categoryNames = {
                stars: '⭐ 恒星知识',
                constellations: '🌌 星座与黄道',
                planets: '🪐 行星与天体',
                units: '📏 天文单位与换算',
                spacecraft: '🛸 航天器与探测'
            };
            
            document.getElementById('categoryDisplay').textContent = categoryNames[quizState.currentCategory];
            document.getElementById('totalQuestions').textContent = quizState.questions.length;
            
            showMenu('quizMenu');
            displayQuestion();
        }

        // ==================== 显示题目 ====================
        function displayQuestion() {
            const question = quizState.questions[quizState.currentQuestionIndex];
            
            document.getElementById('currentQuestion').textContent = quizState.currentQuestionIndex + 1;
            document.getElementById('questionNumber').textContent = `第 ${quizState.currentQuestionIndex + 1} 题`;
            document.getElementById('questionText').textContent = question.question;
            
            // 显示选项
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index);
                optionDiv.id = `option-${index}`;
                optionsContainer.appendChild(optionDiv);
            });
            
            // 重置反馈
            document.getElementById('answerFeedback').classList.remove('show');
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('finishBtn').style.display = 'none';
            
            quizState.isAnswered = false;
        }

        // ==================== 选择选项 ====================
        function selectOption(index) {
            if (quizState.isAnswered) return;
            
            // 移除其他选项的选中状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 选中当前选项
            document.getElementById(`option-${index}`).classList.add('selected');
            quizState.userAnswers[quizState.currentQuestionIndex] = index;
        }

        // ==================== 提交答案 ====================
        function submitAnswer() {
            if (quizState.userAnswers[quizState.currentQuestionIndex] === undefined) {
                alert('请先选择一个答案');
                return;
            }
            
            const question = quizState.questions[quizState.currentQuestionIndex];
            const userAnswerIndex = quizState.userAnswers[quizState.currentQuestionIndex];
            const correctAnswerIndex = question.answer;
            
            const isCorrect = userAnswerIndex === correctAnswerIndex;
            
            if (isCorrect) {
                quizState.correctCount++;
            } else {
                quizState.wrongCount++;
            }
            
            // 显示反馈
            const feedback = document.getElementById('answerFeedback');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackContent = document.getElementById('feedbackContent');
            
            if (isCorrect) {
                feedbackTitle.textContent = '✅ 回答正确！';
                feedbackTitle.className = 'feedback-title correct';
                feedbackContent.innerHTML = `
                    <strong>你的答案：</strong> ${question.options[userAnswerIndex]}<br>
                    <strong>正确答案：</strong> ${question.options[correctAnswerIndex]}<br>
                    ${question.explanation ? `<strong>解析：</strong> ${question.explanation}` : ''}
                `;
            } else {
                feedbackTitle.textContent = '❌ 回答错误';
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackContent.innerHTML = `
                    <strong>你的答案：</strong> ${question.options[userAnswerIndex]}<br>
                    <strong>正确答案：</strong> ${question.options[correctAnswerIndex]}<br>
                    ${question.explanation ? `<strong>解析：</strong> ${question.explanation}` : ''}
                `;
            }
            
            feedback.classList.add('show');
            
            // 显示选项的正确/错误状态
            document.getElementById(`option-${correctAnswerIndex}`).classList.add('correct');
            if (!isCorrect) {
                document.getElementById(`option-${userAnswerIndex}`).classList.add('incorrect');
            }
            
            // 禁用所有选项
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
            });
            
            // 显示下一题或完成按钮
            document.getElementById('submitBtn').style.display = 'none';
            
            if (quizState.currentQuestionIndex < quizState.questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                document.getElementById('finishBtn').style.display = 'block';
            }
            
            quizState.isAnswered = true;
        }

        // ==================== 下一题 ====================
        function nextQuestion() {
            quizState.currentQuestionIndex++;
            displayQuestion();
        }

        // ==================== 完成答题 ====================
        function finishQuiz() {
            const totalQuestions = quizState.questions.length;
            const correctRate = Math.round((quizState.correctCount / totalQuestions) * 100);
            
            // 确定评价等级
            let resultLevel = 'poor';
            let resultTitle = '继续加油！';
            let resultMessage = '你的成绩还需要提高，建议复习相关知识点后再试一次。';
            
            if (correctRate >= 90) {
                resultLevel = 'excellent';
                resultTitle = '🎉 优秀！';
                resultMessage = '你的表现非常出色，对天文知识的掌握已经很深入了！';
            } else if (correctRate >= 70) {
                resultLevel = 'good';
                resultTitle = '👍 不错！';
                resultMessage = '你的成绩不错，继续保持并深化对知识的理解。';
            }
            
            document.getElementById('resultTitle').textContent = resultTitle;
            document.getElementById('resultTitle').className = `result-title ${resultLevel}`;
            document.getElementById('resultScore').textContent = `${correctRate}%`;
            document.getElementById('resultScore').className = `result-score ${resultLevel}`;
            document.getElementById('correctCount').textContent = quizState.correctCount;
            document.getElementById('wrongCount').textContent = quizState.wrongCount;
            document.getElementById('correctRate').textContent = `${correctRate}%`;
            document.getElementById('resultMessage').textContent = resultMessage;
            
            showMenu('resultMenu');
        }

        // ==================== 返回分类选择 ====================
        function backToCategorySelector() {
            document.getElementById('categorySelector').style.display = 'block';
            document.getElementById('difficultySelector').style.display = 'none';
            showMenu('questionMenu');
        }

        // ==================== 页面加载 ====================
        window.addEventListener('load', () => {
            showMenu('mainMenu');
        });
    </script>
</body>
</html>
