<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Menu</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            transition: background-color 0.5s;
        }
        button {
            background-color: #555;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #666;
        }
        .submenu {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>主菜单</h1>
    <button id="libBtn">知识点库</button>
    <button id="questionBtn">题库</button>
    <button id="errorBtn">个性化易错题库</button>

    <div class="submenu" id="difficultyMenu">
        <h2>选择难度</h2>
        <button id="beginner">初学者</button>
        <button id="intermediate">中等水平</button>
        <button id="advanced">高水平</button>
        <br><br>
        <button id="returnBtn">返回主菜单</button>
    </div>

    <script>
        const questionBtn = document.getElementById('questionBtn');
        const difficultyMenu = document.getElementById('difficultyMenu');
        const returnBtn = document.getElementById('returnBtn');

        questionBtn.onclick = () => {
            difficultyMenu.style.display = 'block';
        };

        returnBtn.onclick = () => {
            difficultyMenu.style.display = 'none';
        };

        document.getElementById('beginner').onclick = () => {
            alert('您选择了：初学者');
        };
        document.getElementById('intermediate').onclick = () => {
            alert('您选择了：中等水平');
        };
        document.getElementById('advanced').onclick = () => {
            alert('您选择了：高水平');
        };
    </script>
</body>
</html>
