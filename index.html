<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank</title>
</head>
<body>
    <h1>Question Bank</h1>
    <div>
        <button onclick="showDifficulty('初学者')">初学者</button>
        <button onclick="showDifficulty('中等水平')">中等水平</button>
        <button onclick="showDifficulty('高水平')">高水平</button>
    </div>
    <div id="difficultyMenu" style="display:none;">
        <h2>Difficulty Level: <span id="selectedDifficulty"></span></h2>
        <p>Questions will be displayed here based on the chosen difficulty.</p>
    </div>
    <script>
        function showDifficulty(level) {
            document.getElementById('selectedDifficulty').innerText = level;
            document.getElementById('difficultyMenu').style.display = 'block';
        }
    </script>
</body>
</html>
